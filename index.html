<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Happy Birthday Fayi 🐟🐱💕</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:ital,wght@0,600;0,700;0,800;0,900;1,600&family=Playfair+Display:ital,wght@0,700;1,400;1,700&family=Caveat:wght@600;700&display=swap" rel="stylesheet"/>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --sky: #a8d4f5; --sky2: #c8e8f8; --pink: #f5b8d0; --pink2: #fce4ee;
      --pink3: #e87aaa; --blush: #ffd6e7; --lilac: #d4b8f5; --gold: #f5d76e;
      --navy: #2d3060; --text: #2d2d4a; --soft: #6a6090;
    }
    html { scroll-behavior: smooth; }
    body { font-family: 'Nunito', sans-serif; color: var(--text); overflow-x: hidden; }
    
    /* BACKGROUND & HERO SECTIONS */
    .hero { 
      min-height: 100vh; 
      display: flex; 
      flex-direction: column; 
      align-items: center; 
      justify-content: center; 
      text-align: center; 
      padding: 40px 24px; 
      background: linear-gradient(135deg, var(--sky2), var(--blush)); /* Ganti background base64 dengan gradient pastel */
    }
    
    h1 { font-family: 'Playfair Display', serif; font-size: 3rem; color: var(--navy); margin-bottom: 10px; }
    p { font-size: 1.2rem; color: var(--soft); margin-bottom: 20px; }
    
    /* FORM INPUT SECTIONS */
    .input-section { margin-top: 30px; background: white; padding: 25px; border-radius: 15px; box-shadow: 0 8px 24px rgba(0,0,0,0.05); }
    input[type="email"], select, input[type="date"] { 
      padding: 10px; width: 100%; max-width: 300px; margin-bottom: 15px; border: 2px solid var(--pink2); border-radius: 8px; font-size: 1rem; 
    }
    button { 
      background: var(--pink3); color: white; border: none; padding: 12px 30px; border-radius: 25px; font-weight: bold; cursor: pointer; transition: 0.3s; 
    }
    button:hover { background: var(--navy); }
    
    /* DECORATIONS */
    .burst { position: fixed; font-size: 2rem; pointer-events: none; animation: floatUp 0.7s ease-out forwards; }
    @keyframes floatUp { 0% { transform: translateY(0) scale(1); opacity: 1; } 100% { transform: translateY(-100px) scale(1.5); opacity: 0; } }
  </style>
</head>
<body>

  <div class="hero">
    <h1>Happy Birthday Fayi 🐟🐱💕</h1>
    <p>Selamat ulang tahun! Yuk atur tanggal makan-makan bareng.</p>
    
    <div class="input-section">
      <h3>Pilih Tanggal Birthday Dinner 🍔</h3>
      <br>
      <input type="date" id="dinner-date" value="2026-05-23">
      <br>
      <button onclick="confirmDate()">Konfirmasi Tanggal</button>
      
      <div id="confirmed-msg" style="display:none; margin-top: 20px;">
        <p id="dinner-text"></p>
        
        <div id="email-section" style="display:none;">
          <input type="email" id="notif-email" placeholder="Masukkan email kamu..."><br>
          <button onclick="sendNotif()">Kirim Notifikasi 📧</button>
        </div>
        <p id="notif-sent-txt" style="margin-top: 15px; color: green; font-weight: bold;"></p>
      </div>
    </div>
  </div>

  <script>
    const BE = ['🎉', '🎂', '💖', '🐟', '🐱', '✨'];

    function confirmDate() {
      const dv = document.getElementById('dinner-date').value;
      if (!dv) { alert('Pilih tanggalnya dulu ya! 📅'); return; }
      
      const ds = new Date(dv).toLocaleDateString('id-ID', { weekday: 'long', month: 'long', day: 'numeric', year: 'numeric' });
      
      document.getElementById('dinner-text').innerHTML = `Fayi telah memilih tanggal <strong>${ds}</strong> untuk birthday dinner di Dan's Burger! 🍔🐟<br><br><em>Masukkan email di bawah ini untuk mendapatkan notifikasi! 💕</em>`;
      document.getElementById('confirmed-msg').style.style.display = 'block';
      document.getElementById('email-section').style.display = 'block';
      
      // Efek dekorasi kembang api/burst emoji
      for (let j = 0; j < 12; j++) {
        setTimeout(() => {
          const b = document.createElement('div');
          b.className = 'burst';
          b.textContent = BE[Math.floor(Math.random() * BE.length)];
          b.style.left = (Math.random() * window.innerWidth) + 'px';
          b.style.top = (Math.random() * window.innerHeight * .7 + 100) + 'px';
          document.body.appendChild(b);
          setTimeout(() => b.remove(), 700);
        }, j * 60);
      }
    }

    function sendNotif() {
      const email = document.getElementById('notif-email').value.trim();
      if (!email || !email.includes('@')) { alert('Mohon masukkan email yang valid! 📧'); return; }
      
      const dv = document.getElementById('dinner-date').value;
      const ds = new Date(dv).toLocaleDateString('id-ID', { weekday: 'long', month: 'long', day: 'numeric' });
      
      document.getElementById('notif-sent-txt').innerHTML = `✅ <strong>Semua tersimpan!</strong><br>Notifikasi akan dikirimkan ke <strong>${email}</strong><br>Pilihan Fayi: <strong>${ds}</strong> di Dan's Burger 🍔<br><br><em style="font-size:.85rem; color:var(--soft)">💡 Silakan screenshot halaman ini atau catat tanggalnya ya...</em>`;
    }
  </script>
</body>
</html>
